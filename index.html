<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion SOC = FrenchJumper</title>
<link rel="icon" href="./favicon.ico">
<script src="js/config.js"></script>
<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
}

/* layout */
.app{
    display:flex;
    height:100vh;
}

/* menu gauche */
.sidebar{
    width:220px;
    background:#2c3e50;
    color:white;
    padding-top:20px;
}

.sidebar h2{
    text-align:center;
    margin-bottom:20px;
}

.menu{
    list-style:none;
    padding:0;
    margin:0;
}

.menu li{
    padding:12px 20px;
    cursor:pointer;
}

.menu li:hover{
    background:#34495e;
}

/* zone contenu */
.content{
    flex:1;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

</style>
</head>

<body>

<div class="app">

    <div class="sidebar">
        <h2>FrenchJumper</h2>

        <ul class="menu">
			<li onclick="loadPage('actifs.html')">Membres Actifs</li>
			<li onclick="loadPage('anciens.html')">Anciens Membres</li>
			<li onclick="loadPage('mouvements.html')">Mouvements</li>
		</ul>

    </div>

    <div class="content">
        <iframe id="mainFrame" src="actifs.html"></iframe>
    </div>

</div>

<script>

// appel au chargement
checkAdminParam();

function checkAdminParam() {
    const params = new URLSearchParams(window.location.search);

    if (params.get("admin") === "1") {
        sessionStorage.setItem("admin", "true");
    } else {
        sessionStorage.removeItem("admin");
    }
}

function loadPage(page){
    document.getElementById("mainFrame").src = page;
}

</script>

</body>
</html>
